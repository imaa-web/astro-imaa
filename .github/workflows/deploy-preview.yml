name: Deploy preview

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-preview.yml'
  workflow_dispatch:

concurrency:
  group: deploy-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          PUBLIC_DEPLOY_MODE: preview
          PUBLIC_SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Deploy to Cloudflare Workers (preview)
        run: pnpm wrangler deploy --name astro-imaa-preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
